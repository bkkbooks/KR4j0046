body:
  text: 平齋詞詞曲類一詞集之屬提要臣等謹案平齋詞一巻宋洪咨䕫撰咨夔字舜俞號平齋於潜人嘉定元年進士宋史則載其登第在嘉定二年按咸淳臨安志有嘉定元年鄭自誠榜無二年榜宋史誤也理宗朝累官刑部尚書翰林學士知制誥加端明殿學士卒諡忠文有平齋文集已別著録兹詞一巻為毛晉所刻晉跋稱未見其集葢汲古閣偶無其本僅見其詞也咨䕫以才藝自負新第後上書史彌逺自宰相至州縣無不捃摭其短遂為時相所忌十年不調故其詞淋漓激壯多抑塞磊落之感頗有似稼軒龍洲者毛晉跋乃徒以王岐公文多富貴氣擬之殊為未允咨䕫父名鉞號谷隠有詩名咨䕫出蜀時得書數千巻藏蕭寺父子考論諷誦學益宏肆詞注内所稱老人即其父也其子勲燾亦皆能紹其家學鷓鴣天為老人夀後闋云諸孫認取翁翁意插架詩書不負人可想其世業之盛又漢宫春一闋乃慶其父七十作据平齋集有壬辰小雪前奉親遊道塲何山五言古詩一首中有句云老親八十健而集内未載其詞疑其傳稿尚多散佚矣乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:de7b64c6baddcf84dc80c6d4adf2eb7bb7edbc120a850ec9ea57e2a0043a561c
