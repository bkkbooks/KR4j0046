body:
  text: 平齋詞宋洪咨夔撰沁園春夀俞紫薇詩不云乎蒹葭蒼蒼白露為霜看高山喬木青雲老幹英華滋液亦斂而藏匠石操斤便遊林下一舉採之充棟梁須知道是天將大任翕處還張薇郎玉佩丁當問何事午橋花竹莊又星回歲換臘殘春淺錦熏籠紫栗玉杯黃喚起東風吹醒宿酒把甲子從頭重數將明朝去趂傳柑宴近滿袖天香又次黃宰韻歸去來兮杜宇聲聲道不如歸正新煙百五雨留酒病落紅一尺風妬花期睡起緑窗銷殘香篆手板搘頤還倒持無人解自追遊仙夢作送春詩風流不似年時把别墅江山供奕棊空一川芳草半池晴絮歌翻長恨賦續懷離桃葉渡頭沈香亭北往事悠悠難重思裴徊處看鳴鳩喚婦乳燕將兒又夀淮東制置飲馬咸池攬轡崑崙橫騖九州慶中興機會天生山甫非常事業天授留侯左搏龍蛇右馴虎兕萬里中原談笑收功名早便貂蟬獵獵飛出兜牟新氓無限歡謳盡賣劒賣刀歸買牛正麥搖薰吹黃迷斷壟秧涵朝雨緑遍平疇眼底太平不圖再見羅拜焚香青海頭從今去願君王萬歲元帥千秋又用周潛夫韻秋氣悲哉薄寒中人皇皇何之更黃花吹雨蒼苔滑屐欄空鬬鴨床老支龜靜裏蛩音明邊睂睫蹴踏星河天脫鞿清談久頓兩忘妍醜嫫姆西施濓溪家住江湄愛出水芙蓉清絶姿好光風霽月一團和氣尸居龍見神動天隨著察工夫誠存體段個裏語言文字非君家事莫空將太極散打圖碑風流子和楊帥芍藥錦幄醉荼䕷狻猊暖銀蒜壓煙霏正韓范安邊歐蘇領客紅芳庭院緑蔭窗扉看句挽春春肯住更判羽觴揮金繫花腰玉勻人面嬌慵無力婭姹相依繁華都能幾青油幕好與遮護晴暉寄語東君莫教一片輕飛向溫馨深處留歡卜夜月移花影露裛人衣只恐明朝西垣有詔催歸賀新郎夀成都孫宰露洗秋光透指岷峨無邊峭碧與君為夀萬里同隨琴鶴到只願人情長久儘頭白眼青如舊從臾功名三尺劒倚函關風雨蛟龍吼談笑取印如斗從今盡展眉峯皺看諸郎翩翩黃甲班班藍綬一簇孫枝扶膝下翠竹碧梧爭秀便嘉慶圖中都有花影婆娑清晝永護新涼更著絲簧手歡未盡賸添酒又夀程於浩風闕簾花約玉壺天芙蕖欲蓋篔簹初槊宿靄收隂晴色定一點明星碧落光拍滿浮溪岝崿銀櫛鐵冠風物古更秧青麥熟蠶登箔歡取酒為君酌華堂繡衮今如昨長官清水晶燈照珊瑚鉤琢富貴功名知有樣晨起一聲簷鵲使好趂六更宫鑰龍尾朝回長燕喜寶香深醉引萊衣著吹紫鳳舞黃鶴又詠梅用甄龍友韻放了孤山鶴向西湖問訊水邊嫩寒籬落試粉盈盈微見面一點芳心先著正日莫煙輕雲薄欲攬清香和月咽倩馮夷為洗黃金杓花向我勸多酌單于吹徹今成昨未甘渠琢玉為堂把春留却倚遍黃昏欄十二知被兒曹先覺更笑殺盧同赤腳但得東風先在手管緑隂好踐青青約方寸事兩睂角又誰識昂昂鶴且隨緣􅓑水殘山東村西落世事幾畨新局面看底却高三著況轉首西山日薄雪意壓簷梅索笑任柄長柄短鄰家杓篘小甕動孤酌見花憶得年時昨正微醺獨步黃昏被花迷却冷月吹香春弄影么鳳梢頭先覺恍夢斷羅浮山腳欲寄心期無驛使想凌寒不奈腰肢約空憑暖畫欄角漢宫春老人慶七十南極仙翁占太微元蓋洞府為家身騎若木倒景手弄青霞芙蓉飛斾映一川新緑平沙好與問東風結子幾回開遍桃花況是初元玉厯更循環數起希有年華長挹清明夜氣養就丹砂麻姑送酒安期生遺棗如瓜歡醉後呼兒烹試頭綱小鳳團茶夏初臨鐵甕栽荷銅彝種菊膽瓶萱草榴花庭户深沈畫圖低映窗紗數枝竒石谽谺染宣和瑞露明霞於菟長嘯風林闕霜草先斜雪絲香裏氷粉光中興來進酒睡起分茶輕雷急雨銀篁迸插簷牙涼入琵琶枕幃開又送蟾華問生涯山林朝市取次人家滿江紅送雨迎晴花事過一庭芳草簾影動歸來雙燕似悲還笑笑我不知人意變悲人空為韶華老滿天涯都是别離愁無人掃海棠晚荼䕷早飛絮急青梅小把風流醖藉向誰傾倒秋水盈盈魂夢逺春雲漠漠音期悄最關情鵯鵊一聲催窗紗曉又老人遊東山追和俞二卿詞謹用韻把酒西風渾莫問主賓誰惡千古事幾人遇合幾人流落肝膽輪囷溟渤小精神浩蕩蓬萊薄望拒霜紅處是東山長如昨蒼苔迹何曾削黃葉夢何難覺等春雲出岫秋波歸壑老子婆娑風度逺佳人縹眇腰肢約況登高節過又登高須多酌閏九月天香夀朱尚書雲母屏開博山爐尉人間南極星現酥篆千秋燈圖百子酒浪花光照面堂深戲綵任父老兒童爭勸耆艾相將潞國精明恰如清獻春風飄香合殿仗雲齊漏遲宫箭正好簪荷入侍帕柑傳宴日月華蟲蒨絢便與試胸中五紋線夀域長開洪鈞長轉水調歌頭送曹侍郎歸永嘉四海止齋老百世水心羽都將不盡事業付與道俱東氣脈中庸大學體統采薇天保幾疏柘袍紅千仞倚寥碧一點駕歸鴻扈江蘺貫薜荔製芙蓉午橋緑野深處心與境俱融搏控乾坤龍馬簸弄坎離日月蒼鬢映方瞳只恐又催詔飛度橘花風又中夏望前一夕步月如此好明月梅裏自來無炎雲溽霧收盡宇宙一氷壺淺瀨乍分隨合清影欲連還斷滉漾玉浮圖風物庾樓似秋思欠菰蒲醉魂醒塵骨換我非吾瓊簫紫鳳何許風露足清都君看流光多處縹眇澼洸人立白與藕花俱只恐姮娥妬涼透粟生膚念奴嬌老人用僧仲殊韻詠荷花橫披謹和香山老矣正商量不下去留蠻素獨立躊躇腸欲斷一段若耶溪女水底新妝空中香袖斜日疏風浦向人欲語垂楊清蔭多處便好花裏喚船碧筒白酒微吸荷心苦佳月一鈎天四碧隱約明波橫注雪藕逢絲碧蓮見薏枕簟涼如雨一雙宿鷺伴人永夜翹佇又敬借老人燈韻為夀光風霽月信行窩到處人間天上一笑喚回新造化滿眼翠舒紅放腦後功名腳跟富貴夢斷春旗仗幅巾蕭散任他蟣蝨龍象正是楊栁初眠海棠半睡錦繡天開障鶴骨松筋年望八得醉不妨瀾浪節過燒燈時催修禊迎面韶華蕩宗文扶著問翁馬有何向更漏子次黃宰夜聞桂香眼生花燈綴粟人在黃金列屋金縷細道冠明膽瓶涼意生緩歌絃停酒斚待得香風吹下斜月轉斷雲回風流不讓梅好事近次曹提管春行二十四番風才見一番花鳥已自有人春瘦正逺山橫峭踏青底用十分晴半隂晴方好深院日長睡起又海棠開了朝中措送同官滿歸荷花香裏藕絲風人在水晶宫天上橋成喜鵲雲邊帆認歸鴻去天尺五城南杜趣對柘袍紅若問安邊長䇿莫須浪説和戎又次楊仲禹韻翠盆紅藥護觥籌風物似揚州春事一聲杜宇人生能幾狐裘有山可買有書可讀不願封留一任東風輦路羣公蒼佩鳴璆又夀章君舉滂葩七十二灘春鍾瑞石麒麟流水行雲才思光風霧月精神金蕉進酒斑衣起舞喜氣津津羣玉峯頭環珮紫薇花底絲綸點絳唇次張伯修韻花事無多笙歌綰取東風住玉彝雕俎樓外更籌屢醉喚驪駒催上天梯去君知否半邊銅虎鄧艾經行路西江月夀章叔厚庭下宜男萱草牆頭結子榴花非煙非霧富平家人物風流如畫寶月曾修玉斧銀河欲泛仙槎美人睡起緑雲斜一笑扶將夀斚浣溪沙夀子有蒼鶴飛來水竹幽初弦涼月一簾秋木犀花底試新篘鳳咮硯供無盡藏龍飛榜占最高頭慈闈洗眼看封侯又用吳叔永韻細雨斜風寂莫秋黃花壓鬢替人羞闕負箜篌燕子樓寒迷楚夢鳯皇池暖愜秦謳莫雲凝碧可禁愁又夀蔡千及小雨輕霜作嫩寒蠟梅開盡菊花乾清香收拾貯詩肝文武兩魁前樣在功名四諫後來看麻姑進酒斗闌干又六曲平山似去年雪花欺得怕闕寒小窗和月照無眠筆點輕澌心欲折燭搖斜吹淚空煎伴人梅影更堪憐菩薩鬘和子有韻翠翹花艾年時昨鬬新五采同心索含笑祝千秋長眉如莫愁流光旋磨蟻換調重拈起深院竹和絲皺紅裁舞衣鷓鴣天為老人壽天理從來屈有信東風到處物皆春門前驄馬權竒種臺上慈烏反哺心花島屐柳湖尊好將長健傲長貧諸孫認取翁翁意插架詩書不負人蝶戀花畫斛黃花寒更好人愛花繁却被花催老舊恨新愁誰醞造帶圍暗減知多少開眼萬般渾是惱只仗微醺假寐寬懷抱隔屋愁睂春思早數聲啼破池塘草臨江仙萬紫千紅鬢上粉聚成一撮精神宣和宫樣太清真韶風搖斗帳芳露溼綸巾消得流鶯花底滑一聲驚起梁塵扶將芍藥牡丹春光浮金盞面香到玉池津南鄉子向刻作行香子誤或作賀方回風雨過芳晨多少愁紅恨紫塵兩點眉尖凝逺碧紛紛又被楊花誤一春金鳯壓嬌雲睡起紗窗背欠伸心事欲言言不盡沈沈乳燕雛鶯觸撥人眼兒媚平沙芳草渡頭村緑遍去年痕遊絲下上流鶯來往無限銷魂綺窗深靜人歸晚金鴨水沈溫海棠影下子規聲裏立盡黃昏又夀錢德成花光燈影浸簾櫳蓬島現仙翁瑤裾織翠詩瞳點碧酒臉潮紅竇郎隂德知多少萬卷奏新功前庭梧竹後園桃李無限春風南鄉子德清舟中和老人韻霜月冷婷婷夾岸蘆花雪點成短艇水晶宫裏繫間情誰道芙蓉更有城阿鵲數歸程人倚低窗小畫屏莫恨年華飛上鬢堪憑一度春風一度鶯祝英臺近為老人壽臉長紅眉半白老鶴飽風露歲換星移祿運又交午須知命帶將夾福推不去穩做箇榮華彭祖記初度謝他紫燕黃鸝爭先送好語春滿湖山厯厯舊遊處管教栁外行厨花邊步屧長占斷好晴竒雨謁金門夀夢祥春正美滿眼萬紅千紫收拾羣香歸甕蟻長年花信裏深院簾櫳如水雙燕呢喃芳壘唾碧輕衫人送喜梅梢新結子又九日開笑口又是茱茰重九好水佳山長似舊健如黃犢走菊蕊峥峥如豆風雨輕寒初透簷外鵲聲誰送酒莫間金碗手卜算子簸弄栁梢春呼吸花心露倦粉嬌黃扇底風盡向睂心度喚醒海棠紋約住櫻桃素上到瑤臺最上層共跨青鸞去後句夢中得又芍藥打團紅萱草成窩緑簾捲疏風燕子歸依舊盧同屋貧放麴生疏間到青奴熟掃地焚香伴老仙人勝連環玉栁梢青老人生日野服綸巾白鬚紅頰無限陽春二滿三平粗衣淡飯鍾鼎山林尊前喜氣輪囷道蠶麥分朝甲申天放新晴人占一飽老子寬心平齋詞
