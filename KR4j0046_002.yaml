front:
  text: 平齊詞原跋舜俞於潛人其功烈載在史冊如毁鄧艾祠更祠諸葛武侯告其民曰毋事仇讐而忘父母尤為當時稱歎逮卒時御茟批其鯁亮忠慤令抄所著兩漢詔暨詩文行世樓大防又極賞大冶賦一篇豫恨未見全集其詩餘四十有竒多送行獻夀之作無判花嗜酒之篇昔人謂王岐公文多富貴氣余于舜俞之詞亦云湖南毛晉識
